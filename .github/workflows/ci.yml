name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Go Backend ─────────────────────────────────────────────
  backend:
    name: Go Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mara-go-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: mara-go-backend/go.mod
          cache-dependency-path: mara-go-backend/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Run tests
        run: go test ./internal/... -timeout 120s -race -coverprofile=coverage.out

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: mara-go-backend/coverage.out

  # ─── React Frontend ──────────────────────────────────────────
  frontend:
    name: React Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mara-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mara-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: /api

  # ─── Flutter Mobile ──────────────────────────────────────────
  flutter:
    name: Flutter Mobile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mara-flutter

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.0"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze lib/ --no-fatal-infos

      - name: Run unit tests
        run: flutter test
