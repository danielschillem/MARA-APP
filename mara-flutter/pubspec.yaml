name: mara_flutter
description: MARA – App citoyenne de signalement des violences basées sur le genre
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.0.0

  # HTTP & networking
  dio: ^5.4.3
  web_socket_channel: ^3.0.0

  # Local storage (offline queue)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.3.3
  path_provider: ^2.1.3

  # Map
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Location
  geolocator: ^13.0.1
  geocoding: ^3.0.0

  # Media
  image_picker: ^1.1.2
  record: ^5.1.2
  just_audio: ^0.9.40

  # UI
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8
  permission_handler: ^11.3.1

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0
  shared_preferences: ^2.3.3
  connectivity_plus: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
