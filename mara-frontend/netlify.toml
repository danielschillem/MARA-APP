# ============================================================
#  netlify.toml – Netlify build & deploy configuration
#  Frontend: React + Vite  (mara-frontend/)
#
#  Required env var to set in Netlify UI (Site → Environment):
#    VITE_API_URL = https://mara-api.onrender.com/api
# ============================================================

[build]
  base    = "mara-frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# ── SPA fallback: all routes return index.html (React Router) ──
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Security headers ────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection       = "1; mode=block"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# ── Long-lived cache for hashed assets ──────────────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
