# ============================================================
#  render.yaml – Infrastructure-as-Code for Render
#  Docs: https://render.com/docs/blueprint-spec
#
#  Déploiement automatique via:
#    git push origin main
#  ou webhook GitHub Actions (voir .github/workflows/deploy-backend.yml)
#
#  ⚠️  Après le premier déploiement, mettez à jour FRONTEND_URL
#     et FLUTTER_URL avec votre URL Netlify réelle.
# ============================================================

services:
  - type: web
    name: mara-api
    env: go
    rootDir: ./mara-go-backend
    buildCommand: go build -o mara-api ./cmd/server
    startCommand: ./mara-api
    plan: free
    healthCheckPath: /api/health
    autoDeploy: true

    envVars:
      # ── Serveur ───────────────────────────────────────────────
      - key: PORT
        value: "10000"          # Render injecte $PORT automatiquement (10000 en production)
      - key: APP_ENV
        value: production
      - key: DB_SEED
        value: "false"

      # ── CORS ─────────────────────────────────────────────────
      - key: FRONTEND_URL
        value: https://mara-app.netlify.app     # ← remplacer avec votre URL Netlify
      - key: FLUTTER_URL
        value: https://mara-app.netlify.app     # ← remplacer si domaine Flutter différent

      # ── Auth ─────────────────────────────────────────────────
      - key: JWT_SECRET
        generateValue: true                     # Auto-généré par Render (32+ chars)

      # ── Base de données (PostgreSQL – liée depuis le bloc databases)
      - key: DATABASE_URL
        fromDatabase:
          name: mara-db
          property: connectionString

      # ── Upload fichiers ─────────────────────────────────────
      - key: MAX_UPLOAD_MB
        value: "20"
      - key: UPLOAD_DIR
        value: uploads

      # ── APIs externes ─────────────────────────────────────────
      - key: RELIEFWEB_URL
        value: https://api.reliefweb.int/v1

# ── PostgreSQL managé ────────────────────────────────────────
databases:
  - name: mara-db
    plan: free
    databaseName: mara_production
    user: mara
